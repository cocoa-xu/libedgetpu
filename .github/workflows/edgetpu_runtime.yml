name: edgetpu-runtime

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'Comma/space-separated targets to build (linux host triplet or apple triplet), or "all".'
        default: 'all'
        type: string
  pull_request:
    paths-ignore:
        - '**/*.md'
        - 'LICENSE*'
  push:
    tags:
      - 'v*'
    branches:
      - master
      - test-*
    paths-ignore:
    - '**/*.md'
    - 'LICENSE*'

permissions:
  contents: write

concurrency:
  # Include the dispatch target list so per-target re-runs don't cancel each other,
  # while pushes/PRs to the same ref still cancel in progress (group "...-all").
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.targets || 'all' }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.filter.outputs.linux }}
      macos: ${{ steps.filter.outputs.macos }}
      linux_any: ${{ steps.filter.outputs.linux_any }}
      macos_any: ${{ steps.filter.outputs.macos_any }}
    steps:
      - name: Compute target matrix
        id: filter
        env:
          TARGETS: ${{ github.event.inputs.targets || 'all' }}
        run: |
          python3 <<'PY'
          import json, os

          LINUX = [
              {"host": "x86_64-linux-gnu", "cc": "gcc", "cxx": "g++", "cpu": "k8", "c_compiler": "gcc", "cpp_compiler": "g++"},
              {"host": "armv7l-linux-gnueabihf", "cc": "arm-linux-gnueabihf-gcc", "cxx": "arm-linux-gnueabihf-g++", "cpu": "armv7a", "c_compiler": "gcc-arm-linux-gnueabihf", "cpp_compiler": "g++-arm-linux-gnueabihf"},
              {"host": "armv6-linux-gnueabihf", "cc": "arm-linux-gnueabihf-gcc", "cxx": "arm-linux-gnueabihf-g++", "cpu": "armv6", "c_compiler": "gcc-arm-linux-gnueabihf", "cpp_compiler": "g++-arm-linux-gnueabihf"},
              {"host": "aarch64-linux-gnu", "cc": "aarch64-linux-gnu-gcc", "cxx": "aarch64-linux-gnu-g++", "cpu": "aarch64", "c_compiler": "gcc-aarch64-linux-gnu", "cpp_compiler": "g++-aarch64-linux-gnu"},
              {"host": "aarch64-linux-musl", "cc": "zig cc -target aarch64-linux-musl", "cxx": "zig c++ -target aarch64-linux-musl", "cpu": "aarch64", "c_compiler": "", "cpp_compiler": ""},
              {"host": "riscv64-linux-gnu", "cc": "riscv64-linux-gnu-gcc", "cxx": "riscv64-linux-gnu-g++", "cpu": "riscv64", "c_compiler": "gcc-riscv64-linux-gnu", "cpp_compiler": "g++-riscv64-linux-gnu"},
              {"host": "riscv64-linux-musl", "cc": "zig cc -target riscv64-linux-musl", "cxx": "zig c++ -target riscv64-linux-musl", "cpu": "riscv64", "c_compiler": "", "cpp_compiler": ""},
          ]
          MACOS = [
              {"cpu": "darwin_arm64", "triplet": "aarch64-apple-darwin"},
              {"cpu": "darwin_x86_64", "triplet": "x86_64-apple-darwin"},
          ]

          raw = (os.environ.get("TARGETS") or "all").strip()
          sel = None
          if raw and raw.lower() != "all":
              sel = {t.strip() for t in raw.replace(",", " ").split() if t.strip()}

          linux = LINUX if sel is None else [e for e in LINUX if e["host"] in sel]
          macos = MACOS if sel is None else [e for e in MACOS if e["triplet"] in sel or e["cpu"] in sel]

          if sel is not None:
              known = {e["host"] for e in LINUX} | {e["triplet"] for e in MACOS} | {e["cpu"] for e in MACOS}
              unknown = sorted(sel - known)
              if unknown:
                  print("WARNING: ignoring unknown targets:", ", ".join(unknown))

          print("selected linux:", [e["host"] for e in linux])
          print("selected macos:", [e["triplet"] for e in macos])

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("linux=" + json.dumps({"pair": linux}) + "\n")
              f.write("macos=" + json.dumps({"pair": macos}) + "\n")
              f.write("linux_any=" + ("true" if linux else "false") + "\n")
              f.write("macos_any=" + ("true" if macos else "false") + "\n")
          PY

  build_linux:
    needs: setup
    if: ${{ needs.setup.outputs.linux_any == 'true' }}
    runs-on: ubuntu-latest
    # Build inside an Ubuntu 20.04 container so the produced shared libraries
    # link against an older glibc, while still running on a current GitHub runner.
    container: ubuntu:20.04
    defaults:
      run:
        shell: bash
    env:
      LIBUSB_VER: "1.0.30"
      USE_BAZEL_VERSION: "7.7.0"
      ZIG_VERSION: "0.10.1"
      DEBIAN_FRONTEND: noninteractive

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.linux) }}

    steps:
      - name: Install base packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential automake autoconf pkg-config bc m4 \
            unzip zip xz-utils gzip curl wget git ca-certificates file xxd patch \
            python3 python3-numpy \
            ${{ matrix.pair.c_compiler }} ${{ matrix.pair.cpp_compiler }}
          git config --global --add safe.directory '*'

      - name: Install Bazelisk
        run: |
          curl -fSL "https://github.com/bazelbuild/bazelisk/releases/download/v1.29.0/bazelisk-linux-amd64" -o /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Compile libusb
        run: |
          export LIBUSB_INSTALL_DIR="$(pwd)/libusb"
          wget "https://github.com/libusb/libusb/releases/download/v${LIBUSB_VER}/libusb-${LIBUSB_VER}.tar.bz2" -O "libusb-${LIBUSB_VER}.tar.bz2"
          tar -xf "libusb-${LIBUSB_VER}.tar.bz2"
          cd "libusb-${LIBUSB_VER}"
          if [ "${{ matrix.pair.cpu }}" = "armv6" ]; then
            curl -fSL https://github.com/nerves-project/toolchains/releases/download/v13.2.0/nerves_toolchain_armv6_nerves_linux_gnueabihf-linux_x86_64-13.2.0-363664F.tar.xz -o nerves_toolchain_armv6_nerves_linux_gnueabihf-linux_x86_64-13.2.0-363664F.tar.xz
            tar -xf nerves_toolchain_armv6_nerves_linux_gnueabihf-linux_x86_64-13.2.0-363664F.tar.xz
            export PATH="$(pwd)/nerves_toolchain_armv6_nerves_linux_gnueabihf-linux_x86_64-13.2.0/bin:${PATH}"
            CC="armv6-nerves-linux-gnueabihf-gcc" CFLAGS="-mabi=aapcs-linux -mfpu=vfp -marm -fstack-protector-strong -mfloat-abi=hard -mcpu=arm1176jzf-s -fPIC -Wl,-z,now -Wl,-z,relro" ./configure --host="arm-linux-gnueabihf" --disable-static --enable-shared --disable-udev --prefix="${LIBUSB_INSTALL_DIR}"
          else
            CC="${{ matrix.pair.cc }}" CFLAGS="-fPIC" ./configure --host="${{ matrix.pair.host }}" --enable-static --disable-shared --disable-udev --prefix="${LIBUSB_INSTALL_DIR}"
          fi
          make -j`nproc`
          make install
          PKG_CONFIG_PATH="${LIBUSB_INSTALL_DIR}/lib/pkgconfig" pkg-config --cflags-only-I libusb-1.0

      - name: Compile libedgetpu
        run: |
          export PKG_CONFIG_PATH="$(pwd)/libusb/lib/pkgconfig"
          echo "PKG_CONFIG_PATH: ${PKG_CONFIG_PATH}"
          pkg-config --cflags-only-I libusb-1.0 || true

          if [[ "${{ matrix.pair.host }}" == *"musl"* ]]; then
            CPU="${{ matrix.pair.cpu }}" ABI=musl OSSmall=linux make libedgetpu
          elif [ "${{ matrix.pair.cpu }}" = "armv6" ]; then
            cp WORKSPACE.armv6 WORKSPACE
            cp workspace.armv6.bzl workspace.bzl
            cp .bazelrc.armv6 .bazelrc
            cp error_codes.armv6.h port/default/error_codes.h
            CPU="armv6" make libedgetpu
          else
            # No CC/CXX export: the target compiler comes from the registered
            # platform toolchain (see Makefile/BUILD), and host tools (e.g. flatc)
            # must build with the default x86_64 toolchain, not the cross compiler.
            CPU="${{ matrix.pair.cpu }}" make libedgetpu
          fi

      - name: Release
        run: |
          export PACK_DIR=edgetpu_runtime

          export LIBEDGETPU_NAME="${{ matrix.pair.cpu }}"
          export TRIPLET="${{ matrix.pair.host }}"
          bash scripts/pack.sh out "${LIBEDGETPU_NAME}" "${TRIPLET}" "${PACK_DIR}"
          export ARTEFACT_FILENAME="edgetpu_runtime_${TRIPLET}_${GITHUB_REF##*/}"
          tar -czf "${ARTEFACT_FILENAME}.tar.gz" "${PACK_DIR}"
          rm -rf "${PACK_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetpu_runtime_${{ matrix.pair.host }}
          path: "edgetpu_runtime_*.tar.gz"
          if-no-files-found: error

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "edgetpu_runtime_*.tar.gz"

  build_macos:
    needs: setup
    if: ${{ needs.setup.outputs.macos_any == 'true' }}
    runs-on: macos-14
    env:
      USE_BAZEL_VERSION: "7.7.0"
      TF_NEED_HDFS: "0"
      TF_NEED_CUDA: "0"
      TF_NEED_ROCM: "0"
      TF_NEED_MKL: "0"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.macos) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          brew install libusb
          python3 -m venv edgetpu
          source edgetpu/bin/activate
          python3 -m pip install numpy

      - name: Select Xcode
        run: |
          echo "Available Xcode versions:"
          ls -d /Applications/Xcode*.app
          XCODE="$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -viE 'beta|rc' | sort -V | tail -n1)"
          if [ -z "${XCODE}" ]; then XCODE="/Applications/Xcode.app"; fi
          echo "Selecting Xcode at: ${XCODE}"
          sudo xcode-select -s "${XCODE}/Contents/Developer"
          sudo xcodebuild -license accept || true
          xcode-select -p
          bazel clean --expunge || true
          bazel shutdown || true

      - name: Compile
        run: |
          export PYTHON_BIN_PATH="$(which python3)"
          source edgetpu/bin/activate
          CPU="${{ matrix.pair.cpu }}" make

      - name: codesign
        run: |
          codesign -f --sign - "$(pwd)/out/direct/${{ matrix.pair.cpu }}/libedgetpu.1.0.dylib"
          codesign -f --sign - "$(pwd)/out/throttled/${{ matrix.pair.cpu }}/libedgetpu.1.0.dylib"

      - name: Release
        run: |
          export PACK_DIR=edgetpu_runtime

          export LIBEDGETPU_NAME="${{ matrix.pair.cpu }}"
          export TRIPLET="${{ matrix.pair.triplet }}"
          bash scripts/pack.sh out "${LIBEDGETPU_NAME}" "${TRIPLET}" "${PACK_DIR}"
          export ARTEFACT_FILENAME="edgetpu_runtime_${TRIPLET}_${GITHUB_REF##*/}"
          tar -czf "${ARTEFACT_FILENAME}.tar.gz" "${PACK_DIR}"
          rm -rf "${PACK_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgetpu_runtime_${{ matrix.pair.triplet }}
          path: "edgetpu_runtime_*.tar.gz"
          if-no-files-found: error

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "edgetpu_runtime_*.tar.gz"
